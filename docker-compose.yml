version: '3.8'

services:
  nanobot:
    image: smanx/nanobot:latest
    container_name: nanobot
    restart: unless-stopped
    volumes:
      - nanobot_data:/root/.nanobot
    ports:
      - "18790:18790"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NANOBOT_PROVIDER=${NANOBOT_PROVIDER:-zhipu}
      - NANOBOT_MODEL=${NANOBOT_MODEL:-glm-5}
      - TZ=UTC
    networks:
      - proxy-net
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /root/.nanobot
        cat > /root/.nanobot/config.json << CONFIGEOF
        {
          "providers": {
            "openrouter": {
              "apiKey": "$$OPENROUTER_API_KEY"
            },
            "zhipu": {
              "apiKey": "$$ZAI_API_KEY"
            },
            "openai": {
              "apiKey": "$$OPENAI_API_KEY"
            },
            "anthropic": {
              "apiKey": "$$ANTHROPIC_API_KEY"
            },
            "deepseek": {
              "apiKey": "$$DEEPSEEK_API_KEY"
            },
            "gemini": {
              "apiKey": "$$GEMINI_API_KEY"
            }
          },
          "agents": {
            "defaults": {
              "model": "$$NANOBOT_MODEL",
              "provider": "$$NANOBOT_PROVIDER"
            }
          }
        }
        CONFIGEOF
        exec nanobot gateway
    stdin_open: true
    tty: true

volumes:
  nanobot_data:
    driver: local

networks:
  proxy-net:
    external: true
