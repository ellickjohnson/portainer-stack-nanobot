version: '3.8'

services:
  nanobot:
    image: smanx/nanobot:latest
    container_name: nanobot
    restart: unless-stopped
    volumes:
      - nanobot_data:/root/.nanobot
    environment:
      - TZ=UTC
    ports:
      - "8765:8765"
    command: ["gateway"]
    stdin_open: true
    tty: true

volumes:
  nanobot_data:
    driver: local
